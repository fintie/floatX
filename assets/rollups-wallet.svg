<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Rollups Wallet product visual</title>
  <desc id="desc">A wallet dashboard visual showing rollup accounts, balances, settlement proofs, and transfers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#e0f2fe" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="44" fill="url(#bg)"/>
  <circle cx="1010" cy="132" r="142" fill="#67e8f9" opacity="0.16"/>
  <circle cx="190" cy="630" r="185" fill="#bfdbfe" opacity="0.14"/>
  <g filter="url(#shadow)">
    <rect x="385" y="72" width="430" height="620" rx="48" fill="#0f172a"/>
    <rect x="415" y="112" width="370" height="540" rx="34" fill="url(#card)"/>
    <rect x="546" y="88" width="108" height="10" rx="5" fill="#334155"/>
  </g>
  <text x="455" y="173" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#0f172a">Rollups Wallet</text>
  <text x="455" y="205" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Multi-rollup assets and settlement state</text>
  <rect x="455" y="238" width="290" height="96" rx="20" fill="#0f172a"/>
  <text x="480" y="275" font-family="Inter, Arial, sans-serif" font-size="15" fill="#93c5fd">Total balance</text>
  <text x="480" y="314" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">$248,920</text>
  <rect x="455" y="360" width="132" height="74" rx="18" fill="#dbeafe"/>
  <rect x="613" y="360" width="132" height="74" rx="18" fill="#ccfbf1"/>
  <text x="477" y="390" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1e3a8a">Optimism</text>
  <text x="477" y="418" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#172554">42%</text>
  <text x="635" y="390" font-family="Inter, Arial, sans-serif" font-size="14" fill="#115e59">zkSync</text>
  <text x="635" y="418" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#134e4a">31%</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="455" y="464" width="290" height="52" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="485" cy="490" r="12" fill="#22c55e"/>
    <text x="510" y="486" font-size="14" font-weight="700" fill="#0f172a">Proof verified</text>
    <text x="510" y="504" font-size="12" fill="#64748b">Batch #1842 settled</text>
    <rect x="455" y="528" width="290" height="52" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="485" cy="554" r="12" fill="#3b82f6"/>
    <text x="510" y="550" font-size="14" font-weight="700" fill="#0f172a">Bridge transfer</text>
    <text x="510" y="568" font-size="12" fill="#64748b">L2 to settlement account</text>
  </g>
  <g opacity="0.9" stroke="#ffffff" stroke-width="3" fill="none">
    <path d="M205 268 C300 190, 338 350, 414 286"/>
    <path d="M785 498 C894 420, 930 548, 1010 472"/>
    <circle cx="205" cy="268" r="12" fill="#ffffff"/>
    <circle cx="414" cy="286" r="12" fill="#ffffff"/>
    <circle cx="785" cy="498" r="12" fill="#ffffff"/>
    <circle cx="1010" cy="472" r="12" fill="#ffffff"/>
  </g>
</svg>
